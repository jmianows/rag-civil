<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG-CIVIL // CODE LOOKUP</title>
<style>
  :root {
    --bg:       #0a0a0a;
    --bg1:      #111111;
    --bg2:      #1a1a1a;
    --bg3:      #222222;
    --border:   #2a2a2a;
    --border2:  #333333;
    --text:     #c8c8c8;
    --dim:      #666666;
    --dim2:     #444444;
    --accent:   #4a9eff;
    --accent2:  #2a6acc;
    --green:    #4aff8a;
    --green2:   #1a8a4a;
    --yellow:   #ffcc44;
    --red:      #ff4a4a;
    --orange:   #ff8a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── header ── */
  #header {
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #header .logo {
    color: var(--accent);
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 2px;
    white-space: nowrap;
  }
  #header .tagline {
    color: var(--dim);
    font-size: 11px;
  }
  #header .spacer { flex: 1; }
  #status-bar {
    font-size: 11px;
    color: var(--dim);
  }
  #status-bar .ok  { color: var(--green); }
  #status-bar .err { color: var(--red); }

  /* ── layout ── */
  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    margin: 0 2ch;
  }

  /* ── sidebar ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 10px 4px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .history-item {
    padding: 6px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--dim);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s, color 0.1s;
  }
  .history-item:hover { background: var(--bg2); color: var(--text); }
  .history-item.active { background: var(--bg3); color: var(--accent); }
  .history-item .ts {
    display: block;
    font-size: 10px;
    color: var(--dim2);
  }
  #history-empty {
    padding: 12px 10px;
    color: var(--dim2);
    font-size: 11px;
  }

  /* ── main panel ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── query area ── */
  #query-panel {
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    flex-shrink: 0;
  }
  #query-row {
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  #query-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 8px;
    resize: none;
    outline: none;
    min-height: 36px;
    max-height: 120px;
    overflow-y: auto;
  }
  #query-input:focus { border-color: var(--accent2); }
  #query-input::placeholder { color: var(--dim2); }

  #submit-btn {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 1px;
    transition: background 0.1s;
    height: 36px;
  }
  #submit-btn:hover:not(:disabled) { background: var(--accent); }
  #submit-btn:disabled { opacity: 0.4; cursor: default; }

  #filter-row {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    align-items: center;
  }
  .filter-label { color: var(--dim); font-size: 11px; }
  select.filter {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 3px 6px;
    outline: none;
  }
  select.filter:focus { border-color: var(--accent2); }

  /* ── output area ── */
  #output-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── response block ── */
  #response-block {
    display: none;
  }
  .section-label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #response-text {
    background: var(--bg1);
    border: 1px solid var(--border);
    padding: 10px 12px;
    white-space: pre-wrap;
    line-height: 1.6;
    color: var(--text);
    font-size: 13px;
  }

  /* ── citations ── */
  #citations-block {
    display: none;
  }
  .citation {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    padding: 8px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .citation + .citation { margin-top: 6px; }
  .citation-meta {
    flex: 1;
    min-width: 0;
  }
  .citation-file {
    color: var(--accent);
    font-size: 12px;
    font-weight: bold;
  }
  .citation-detail {
    color: var(--dim);
    font-size: 11px;
    margin-top: 2px;
  }
  .citation-detail span { color: var(--text); font-weight: bold; }
  .citation-corrected {
    color: var(--orange);
    font-size: 10px;
    margin-top: 2px;
  }
  .citation-distance {
    color: var(--dim2);
    font-size: 10px;
    white-space: nowrap;
    padding-top: 2px;
  }
  .correct-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--yellow);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.1s;
  }
  .correct-btn:hover { background: var(--bg2); border-color: var(--yellow); }

  /* ── correct modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.visible { display: flex; }
  #modal {
    background: var(--bg1);
    border: 1px solid var(--border2);
    padding: 16px;
    min-width: 380px;
    max-width: 520px;
  }
  #modal h3 {
    color: var(--yellow);
    font-size: 12px;
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  #modal .modal-info {
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  #modal .modal-info span { color: var(--text); }
  #modal label {
    color: var(--dim);
    font-size: 11px;
    display: block;
    margin-bottom: 4px;
  }
  #modal-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 8px;
    outline: none;
    margin-bottom: 10px;
  }
  #modal-input:focus { border-color: var(--yellow); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
  }
  .modal-btn.confirm {
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .modal-btn:hover { background: var(--bg2); }

  /* ── progress / spinner ── */
  #progress {
    display: none;
    color: var(--accent);
    font-size: 12px;
    padding: 8px 0;
  }
  .spinner { animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── error ── */
  #error-msg {
    display: none;
    color: var(--red);
    background: var(--bg1);
    border: 1px solid var(--red);
    padding: 8px 10px;
    font-size: 12px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<div id="header">
  <div class="logo">RAG-CIVIL</div>
  <div class="tagline">civil engineering code lookup // v0.4</div>
  <div class="spacer"></div>
  <div id="status-bar">API: <span id="api-status">checking...</span></div>
</div>

<div id="layout">

  <!-- sidebar: history -->
  <div id="sidebar">
    <div class="sidebar-label">Query History</div>
    <div id="history-list">
      <div id="history-empty">no queries yet</div>
    </div>
  </div>

  <!-- main -->
  <div id="main">
    <div id="query-panel">
      <div id="query-row">
        <textarea id="query-input" rows="1"
          placeholder="enter query... (enter to submit, shift+enter for newline)"></textarea>
        <button id="submit-btn">QUERY</button>
      </div>
      <div id="filter-row">
        <span class="filter-label">FILTER:</span>
        <select class="filter" id="filter-agency">
          <option value="">all agencies</option>
        </select>
        <select class="filter" id="filter-jurisdiction">
          <option value="">all jurisdictions</option>
        </select>
      </div>
    </div>

    <div id="output-area">
      <div id="progress"><span class="spinner">█</span> <span id="progress-text">running query...</span></div>
      <div id="error-msg"></div>

      <div id="response-block">
        <div class="section-label">Response</div>
        <div id="response-text"></div>
      </div>

      <div id="citations-block">
        <div class="section-label">Citations (<span id="citation-count">0</span>)</div>
        <div id="citations-list"></div>
      </div>
    </div>
  </div>

</div>

<!-- correction modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>Correct Section Number</h3>
    <div class="modal-info" id="modal-info"></div>
    <label>New section number:</label>
    <input id="modal-input" type="text" placeholder="e.g. 1926.502(d)">
    <div class="modal-btns">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn confirm" id="modal-confirm">Apply</button>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin

// ── state ──
let history = [];
let currentIndex = -1;
let pendingCorrection = null;

// ── elements ──
const queryInput    = document.getElementById('query-input');
const submitBtn     = document.getElementById('submit-btn');
const filterAgency  = document.getElementById('filter-agency');
const filterJuris   = document.getElementById('filter-jurisdiction');
const progressEl    = document.getElementById('progress');
const progressText  = document.getElementById('progress-text');
const errorEl       = document.getElementById('error-msg');
const responseBlock = document.getElementById('response-block');
const responseText  = document.getElementById('response-text');
const citationsBlock= document.getElementById('citations-block');
const citationsList = document.getElementById('citations-list');
const citationCount = document.getElementById('citation-count');
const historyList   = document.getElementById('history-list');
const historyEmpty  = document.getElementById('history-empty');
const apiStatus     = document.getElementById('api-status');
const modalOverlay  = document.getElementById('modal-overlay');
const modalInfo     = document.getElementById('modal-info');
const modalInput    = document.getElementById('modal-input');
const modalCancel   = document.getElementById('modal-cancel');
const modalConfirm  = document.getElementById('modal-confirm');

// ── api status check ──
async function checkApi() {
  try {
    const r = await fetch(API + '/filters');
    if (r.ok) {
      apiStatus.className = 'ok';
      apiStatus.textContent = 'online';
      const data = await r.json();
      populateFilters(data);
    } else {
      throw new Error(r.status);
    }
  } catch(e) {
    apiStatus.className = 'err';
    apiStatus.textContent = 'offline';
  }
}

function populateFilters(data) {
  data.agencies.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    filterAgency.appendChild(opt);
  });
  data.jurisdictions.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j; opt.textContent = j;
    filterJuris.appendChild(opt);
  });
}

// ── query ──
async function runQuery() {
  const q = queryInput.value.trim();
  if (!q) return;

  setLoading(true);
  clearOutput();

  const body = {
    query: q,
    filter_agency: filterAgency.value || null,
    filter_jurisdiction: filterJuris.value || null,
  };

  try {
    const steps = [
      'connecting to database...',
      'embedding query...',
      'retrieving chunks...',
      'enriching sections...',
      'generating response...',
    ];
    let si = 0;
    const stepTimer = setInterval(() => {
      si = (si + 1) % steps.length;
      progressText.textContent = steps[si];
    }, 1800);

    const r = await fetch(API + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    clearInterval(stepTimer);

    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.detail || r.statusText);
    }

    const data = await r.json();
    pushHistory(q, data);
    renderResult(data);

  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  submitBtn.disabled = on;
  progressEl.style.display = on ? 'block' : 'none';
  if (on) progressText.textContent = 'connecting to database...';
}

function clearOutput() {
  errorEl.style.display = 'none';
  responseBlock.style.display = 'none';
  citationsBlock.style.display = 'none';
  responseText.textContent = '';
  citationsList.innerHTML = '';
}

function showError(msg) {
  errorEl.textContent = 'ERROR: ' + msg;
  errorEl.style.display = 'block';
}

function renderResult(data) {
  // response
  responseBlock.style.display = 'block';
  responseText.textContent = data.response;

  // citations
  if (data.chunks && data.chunks.length > 0) {
    citationsBlock.style.display = 'block';
    citationCount.textContent = data.chunks.length;
    citationsList.innerHTML = '';
    data.chunks.forEach(chunk => {
      citationsList.appendChild(buildCitation(chunk));
    });
  }
}

function buildCitation(chunk) {
  const div = document.createElement('div');
  div.className = 'citation';

  const meta = document.createElement('div');
  meta.className = 'citation-meta';

  const file = document.createElement('div');
  file.className = 'citation-file';
  file.textContent = chunk.source_file;
  meta.appendChild(file);

  const detail = document.createElement('div');
  detail.className = 'citation-detail';
  detail.innerHTML =
    `section <span>${chunk.section || 'UNKNOWN'}</span>` +
    ` &nbsp;|&nbsp; page <span>${chunk.doc_page || '?'}</span>` +
    ` &nbsp;|&nbsp; <span>${chunk.agency || ''}</span>` +
    (chunk.jurisdiction ? ` &nbsp;|&nbsp; <span>${chunk.jurisdiction}</span>` : '');
  meta.appendChild(detail);

  if (chunk.llm_corrected_section) {
    const corr = document.createElement('div');
    corr.className = 'citation-corrected';
    corr.textContent = '[section llm-corrected]';
    meta.appendChild(corr);
  }

  div.appendChild(meta);

  const dist = document.createElement('div');
  dist.className = 'citation-distance';
  dist.textContent = 'd=' + (chunk.distance || 0).toFixed(3);
  div.appendChild(dist);

  const btn = document.createElement('button');
  btn.className = 'correct-btn';
  btn.textContent = '[fix §]';
  btn.onclick = () => openCorrectModal(chunk);
  div.appendChild(btn);

  return div;
}

// ── history ──
function pushHistory(q, data) {
  const entry = {
    query: q,
    data: data,
    ts: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
  };
  history.unshift(entry);
  currentIndex = 0;
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    historyEmpty.style.display = 'block';
    return;
  }
  historyEmpty.style.display = 'none';
  historyList.innerHTML = '';
  history.forEach((entry, i) => {
    const item = document.createElement('div');
    item.className = 'history-item' + (i === currentIndex ? ' active' : '');
    item.innerHTML = `<span class="ts">${entry.ts}</span>${entry.query}`;
    item.onclick = () => {
      currentIndex = i;
      renderHistory();
      clearOutput();
      renderResult(entry.data);
    };
    historyList.appendChild(item);
  });
}

// ── correction modal ──
function openCorrectModal(chunk) {
  pendingCorrection = chunk;
  modalInfo.innerHTML =
    `File: <span>${chunk.source_file}</span><br>` +
    `Current section: <span>${chunk.section || 'UNKNOWN'}</span><br>` +
    `Page: <span>${chunk.page}</span> &nbsp; Chunk: <span>${chunk.chunk_index !== undefined ? chunk.chunk_index : '?'}</span>`;
  modalInput.value = chunk.section || '';
  modalOverlay.classList.add('visible');
  modalInput.focus();
  modalInput.select();
}

function closeModal() {
  modalOverlay.classList.remove('visible');
  pendingCorrection = null;
}

async function applyCorrection() {
  const c = pendingCorrection;
  const newSection = modalInput.value.trim();
  if (!newSection || !c) { closeModal(); return; }

  modalConfirm.disabled = true;
  modalConfirm.textContent = 'applying...';

  try {
    const r = await fetch(API + '/correct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source_file: c.source_file,
        page: c.page,
        chunk_index: c.chunk_index || 0,
        new_section: newSection,
      }),
    });
    if (!r.ok) throw new Error((await r.json()).detail);

    // update in-memory so current render refreshes
    c.section = newSection;
    c.llm_corrected_section = true;
    // re-render current entry
    if (currentIndex >= 0) renderResult(history[currentIndex].data);

  } catch(e) {
    alert('Correction failed: ' + e.message);
  } finally {
    modalConfirm.disabled = false;
    modalConfirm.textContent = 'Apply';
    closeModal();
  }
}

// ── event listeners ──
submitBtn.addEventListener('click', runQuery);

queryInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    runQuery();
  }
});

// auto-resize textarea
queryInput.addEventListener('input', () => {
  queryInput.style.height = 'auto';
  queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
});

modalCancel.addEventListener('click', closeModal);
modalConfirm.addEventListener('click', applyCorrection);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
modalInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyCorrection(); });

// ── init ──
checkApi();
</script>
</body>
</html>
