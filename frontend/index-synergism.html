<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG-CIVIL // CODE LOOKUP</title>
<style>
  :root {
    --bg:       #060610;
    --bg1:      #0a0a1a;
    --bg2:      #0f0f22;
    --bg3:      #14142a;
    --border:   #1a1a35;
    --border2:  #222244;
    --text:     #d0d0f0;
    --dim:      #505080;
    --dim2:     #303060;
    --cyan:     #00ffff;
    --magenta:  #ff00cc;
    --green:    #00ff88;
    --yellow:   #ffff00;
    --red:      #ff3366;
    --orange:   #ff8833;
    --purple:   #aa44ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes rainbow {
    0%   { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
    25%  { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }
    50%  { color: var(--green); text-shadow: 0 0 8px var(--green); }
    75%  { color: var(--yellow); text-shadow: 0 0 8px var(--yellow); }
    100% { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
  }

  @keyframes sidebarGlow {
    0%   { border-left-color: var(--cyan); }
    33%  { border-left-color: var(--magenta); }
    66%  { border-left-color: var(--purple); }
    100% { border-left-color: var(--cyan); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px var(--cyan), 0 0 12px var(--cyan); }
    50%       { box-shadow: 0 0 10px var(--cyan), 0 0 24px var(--cyan), 0 0 40px rgba(0,255,255,0.3); }
  }

  @keyframes blink { 50% { opacity: 0; } }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(0,100,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(180,0,255,0.04) 0%, transparent 60%);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── header ── */
  #header {
    background: rgba(10,10,26,0.9);
    border-bottom: 1px solid var(--border2);
    box-shadow: 0 1px 12px rgba(0,255,255,0.08);
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #header .logo {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 3px;
    animation: rainbow 4s linear infinite;
  }
  #header .tagline {
    color: var(--dim);
    font-size: 11px;
  }
  #header .spacer { flex: 1; }
  #status-bar {
    font-size: 11px;
    color: var(--dim);
  }
  #status-bar .ok  { color: var(--green); text-shadow: 0 0 6px var(--green); }
  #status-bar .err { color: var(--red); text-shadow: 0 0 6px var(--red); }

  /* ── layout ── */
  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 6px;
    gap: 6px;
  }

  /* ── sidebar ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: rgba(10,10,26,0.8);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--cyan);
    box-shadow: inset 0 0 20px rgba(0,255,255,0.03), -2px 0 16px rgba(0,255,255,0.06);
    animation: sidebarGlow 6s linear infinite;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    border-radius: 3px;
  }
  .sidebar-label {
    color: var(--cyan);
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--border2);
    text-transform: uppercase;
    text-shadow: 0 0 6px var(--cyan);
  }
  #history-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .history-item {
    padding: 6px 10px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--dim);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s, color 0.15s;
  }
  .history-item:hover { background: rgba(0,255,255,0.05); color: var(--cyan); }
  .history-item.active {
    background: rgba(0,255,255,0.08);
    color: var(--cyan);
    text-shadow: 0 0 4px var(--cyan);
  }
  .history-item .ts {
    display: block;
    font-size: 9px;
    color: var(--dim2);
  }
  #history-empty {
    padding: 12px 10px;
    color: var(--dim2);
    font-size: 11px;
  }

  /* ── main panel ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    gap: 6px;
  }

  /* ── query area ── */
  #query-panel {
    background: rgba(10,10,26,0.8);
    border: 1px solid var(--border2);
    box-shadow: 0 0 16px rgba(255,0,204,0.06);
    padding: 8px 12px;
    flex-shrink: 0;
    border-radius: 3px;
  }
  #query-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  #query-input {
    flex: 1;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    resize: none;
    outline: none;
    min-height: 36px;
    max-height: 120px;
    overflow-y: auto;
    border-radius: 2px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #query-input:focus {
    border-color: var(--magenta);
    box-shadow: 0 0 8px rgba(255,0,204,0.3);
  }
  #query-input::placeholder { color: var(--dim2); }

  #submit-btn {
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    border: none;
    color: #000;
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    padding: 6px 16px;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 2px;
    height: 36px;
    border-radius: 2px;
    transition: opacity 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 10px rgba(0,255,255,0.4);
  }
  #submit-btn:hover:not(:disabled) {
    opacity: 0.85;
    box-shadow: 0 0 20px rgba(0,255,255,0.6), 0 0 40px rgba(255,0,204,0.3);
  }
  #submit-btn:disabled { opacity: 0.3; cursor: default; }

  #filter-row {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    align-items: center;
  }
  .filter-label { color: var(--magenta); font-size: 10px; letter-spacing: 1px; text-shadow: 0 0 4px var(--magenta); }
  select.filter {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 6px;
    outline: none;
    border-radius: 2px;
  }
  select.filter:focus { border-color: var(--magenta); }

  /* ── output area ── */
  #output-area {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── response block ── */
  #response-block { display: none; }
  .section-label {
    color: var(--cyan);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 5px;
    text-shadow: 0 0 6px var(--cyan);
  }
  #response-text {
    background: rgba(10,10,26,0.8);
    border: 1px solid var(--border2);
    box-shadow: inset 0 0 20px rgba(0,255,255,0.02);
    padding: 10px 14px;
    white-space: pre-wrap;
    line-height: 1.7;
    color: var(--text);
    font-size: 13px;
    border-radius: 3px;
  }

  /* ── citations ── */
  #citations-block { display: none; }
  .citation {
    background: rgba(10,10,26,0.7);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--cyan);
    padding: 8px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-radius: 2px;
    transition: box-shadow 0.2s;
  }
  .citation:hover { box-shadow: 0 0 12px rgba(0,255,255,0.15); }
  .citation.dist-close { border-left-color: var(--green); }
  .citation.dist-mid   { border-left-color: var(--yellow); }
  .citation.dist-far   { border-left-color: var(--red); }
  .citation + .citation { margin-top: 6px; }
  .citation-meta { flex: 1; min-width: 0; }
  .citation-file {
    color: var(--cyan);
    font-size: 12px;
    font-weight: bold;
    text-shadow: 0 0 4px rgba(0,255,255,0.4);
  }
  .citation-detail {
    color: var(--dim);
    font-size: 11px;
    margin-top: 2px;
  }
  .citation-detail span { color: var(--text); }
  .citation-corrected {
    color: var(--orange);
    font-size: 10px;
    margin-top: 2px;
    text-shadow: 0 0 4px rgba(255,136,51,0.4);
  }
  .citation-distance {
    color: var(--dim2);
    font-size: 10px;
    white-space: nowrap;
    padding-top: 2px;
  }
  .correct-btn {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border2);
    color: var(--yellow);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .correct-btn:hover {
    border-color: var(--yellow);
    box-shadow: 0 0 8px rgba(255,255,0,0.3);
  }

  /* ── correct modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,10,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.visible { display: flex; }
  #modal {
    background: var(--bg1);
    border: 1px solid var(--magenta);
    box-shadow: 0 0 40px rgba(255,0,204,0.3), 0 0 80px rgba(255,0,204,0.1);
    padding: 18px;
    min-width: 380px;
    max-width: 520px;
    border-radius: 3px;
  }
  #modal h3 {
    color: var(--magenta);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
    text-shadow: 0 0 8px var(--magenta);
  }
  #modal .modal-info {
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  #modal .modal-info span { color: var(--text); }
  #modal label {
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
  }
  #modal-input {
    width: 100%;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 8px;
    outline: none;
    margin-bottom: 12px;
    border-radius: 2px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #modal-input:focus {
    border-color: var(--magenta);
    box-shadow: 0 0 8px rgba(255,0,204,0.3);
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 5px 16px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .modal-btn:hover { background: rgba(255,255,255,0.05); }
  .modal-btn.confirm {
    border-color: var(--magenta);
    color: var(--magenta);
  }
  .modal-btn.confirm:hover {
    background: rgba(255,0,204,0.15);
    box-shadow: 0 0 10px rgba(255,0,204,0.3);
  }

  /* ── progress ── */
  #progress {
    display: none;
    color: var(--cyan);
    font-size: 12px;
    padding: 8px 0;
    text-shadow: 0 0 6px var(--cyan);
  }
  .spinner { animation: blink 0.7s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── error ── */
  #error-msg {
    display: none;
    color: var(--red);
    background: rgba(255,51,102,0.08);
    border: 1px solid var(--red);
    padding: 8px 10px;
    font-size: 12px;
    box-shadow: 0 0 12px rgba(255,51,102,0.2);
    border-radius: 2px;
    text-shadow: 0 0 4px rgba(255,51,102,0.5);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
  }
</style>
</head>
<body>

<div id="header">
  <div class="logo">RAG-CIVIL</div>
  <div class="tagline">civil engineering code lookup // v0.4</div>
  <div class="spacer"></div>
  <div id="status-bar">API: <span id="api-status">checking...</span></div>
</div>

<div id="layout">

  <div id="sidebar">
    <div class="sidebar-label">Query History</div>
    <div id="history-list">
      <div id="history-empty">no queries yet</div>
    </div>
  </div>

  <div id="main">
    <div id="query-panel">
      <div id="query-row">
        <textarea id="query-input" rows="1"
          placeholder="enter query... (enter to submit, shift+enter for newline)"></textarea>
        <button id="submit-btn">QUERY</button>
      </div>
      <div id="filter-row">
        <span class="filter-label">FILTER:</span>
        <select class="filter" id="filter-agency">
          <option value="">all agencies</option>
        </select>
        <select class="filter" id="filter-jurisdiction">
          <option value="">all jurisdictions</option>
        </select>
      </div>
    </div>

    <div id="output-area">
      <div id="progress"><span class="spinner">◈</span> <span id="progress-text">running query...</span></div>
      <div id="error-msg"></div>

      <div id="response-block">
        <div class="section-label">Response</div>
        <div id="response-text"></div>
      </div>

      <div id="citations-block">
        <div class="section-label">Citations &nbsp;[<span id="citation-count">0</span>]</div>
        <div id="citations-list"></div>
      </div>
    </div>
  </div>

</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>Correct Section Number</h3>
    <div class="modal-info" id="modal-info"></div>
    <label>New section number:</label>
    <input id="modal-input" type="text" placeholder="e.g. 1926.502(d)">
    <div class="modal-btns">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn confirm" id="modal-confirm">Apply</button>
    </div>
  </div>
</div>

<script>
const API = '';

let history = [];
let currentIndex = -1;
let pendingCorrection = null;

const queryInput    = document.getElementById('query-input');
const submitBtn     = document.getElementById('submit-btn');
const filterAgency  = document.getElementById('filter-agency');
const filterJuris   = document.getElementById('filter-jurisdiction');
const progressEl    = document.getElementById('progress');
const progressText  = document.getElementById('progress-text');
const errorEl       = document.getElementById('error-msg');
const responseBlock = document.getElementById('response-block');
const responseText  = document.getElementById('response-text');
const citationsBlock= document.getElementById('citations-block');
const citationsList = document.getElementById('citations-list');
const citationCount = document.getElementById('citation-count');
const historyList   = document.getElementById('history-list');
const historyEmpty  = document.getElementById('history-empty');
const apiStatus     = document.getElementById('api-status');
const modalOverlay  = document.getElementById('modal-overlay');
const modalInfo     = document.getElementById('modal-info');
const modalInput    = document.getElementById('modal-input');
const modalCancel   = document.getElementById('modal-cancel');
const modalConfirm  = document.getElementById('modal-confirm');

async function checkApi() {
  try {
    const r = await fetch(API + '/filters');
    if (r.ok) {
      apiStatus.className = 'ok';
      apiStatus.textContent = 'online';
      const data = await r.json();
      populateFilters(data);
    } else { throw new Error(r.status); }
  } catch(e) {
    apiStatus.className = 'err';
    apiStatus.textContent = 'offline';
  }
}

function populateFilters(data) {
  data.agencies.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    filterAgency.appendChild(opt);
  });
  data.jurisdictions.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j; opt.textContent = j;
    filterJuris.appendChild(opt);
  });
}

async function runQuery() {
  const q = queryInput.value.trim();
  if (!q) return;

  setLoading(true);
  clearOutput();

  const body = {
    query: q,
    filter_agency: filterAgency.value || null,
    filter_jurisdiction: filterJuris.value || null,
  };

  try {
    const steps = [
      'connecting to database...',
      'embedding query...',
      'retrieving chunks...',
      'enriching sections...',
      'generating response...',
    ];
    let si = 0;
    const stepTimer = setInterval(() => {
      si = (si + 1) % steps.length;
      progressText.textContent = steps[si];
    }, 1800);

    const r = await fetch(API + '/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    clearInterval(stepTimer);

    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.detail || r.statusText);
    }

    const data = await r.json();
    pushHistory(q, data);
    renderResult(data);

  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  submitBtn.disabled = on;
  progressEl.style.display = on ? 'block' : 'none';
  if (on) progressText.textContent = 'connecting to database...';
}

function clearOutput() {
  errorEl.style.display = 'none';
  responseBlock.style.display = 'none';
  citationsBlock.style.display = 'none';
  responseText.textContent = '';
  citationsList.innerHTML = '';
}

function showError(msg) {
  errorEl.textContent = 'ERROR: ' + msg;
  errorEl.style.display = 'block';
}

function renderResult(data) {
  responseBlock.style.display = 'block';
  responseText.textContent = data.response;

  if (data.chunks && data.chunks.length > 0) {
    citationsBlock.style.display = 'block';
    citationCount.textContent = data.chunks.length;
    citationsList.innerHTML = '';
    data.chunks.forEach(chunk => {
      citationsList.appendChild(buildCitation(chunk));
    });
  }
}

function buildCitation(chunk) {
  const div = document.createElement('div');
  const d = chunk.distance || 0;
  const distClass = d < 0.3 ? 'dist-close' : d < 0.6 ? 'dist-mid' : 'dist-far';
  div.className = 'citation ' + distClass;

  const meta = document.createElement('div');
  meta.className = 'citation-meta';

  const file = document.createElement('div');
  file.className = 'citation-file';
  file.textContent = chunk.source_file;
  meta.appendChild(file);

  const detail = document.createElement('div');
  detail.className = 'citation-detail';
  detail.innerHTML =
    `section <span>${chunk.section || 'UNKNOWN'}</span>` +
    ` &nbsp;|&nbsp; page <span>${chunk.doc_page || '?'}</span>` +
    ` &nbsp;|&nbsp; <span>${chunk.agency || ''}</span>` +
    (chunk.jurisdiction ? ` &nbsp;|&nbsp; <span>${chunk.jurisdiction}</span>` : '');
  meta.appendChild(detail);

  if (chunk.llm_corrected_section) {
    const corr = document.createElement('div');
    corr.className = 'citation-corrected';
    corr.textContent = '[section llm-corrected]';
    meta.appendChild(corr);
  }

  div.appendChild(meta);

  const dist = document.createElement('div');
  dist.className = 'citation-distance';
  dist.textContent = 'd=' + d.toFixed(3);
  div.appendChild(dist);

  const btn = document.createElement('button');
  btn.className = 'correct-btn';
  btn.textContent = '[fix §]';
  btn.onclick = () => openCorrectModal(chunk);
  div.appendChild(btn);

  return div;
}

function pushHistory(q, data) {
  const entry = {
    query: q,
    data: data,
    ts: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
  };
  history.unshift(entry);
  currentIndex = 0;
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) {
    historyEmpty.style.display = 'block';
    return;
  }
  historyEmpty.style.display = 'none';
  historyList.innerHTML = '';
  history.forEach((entry, i) => {
    const item = document.createElement('div');
    item.className = 'history-item' + (i === currentIndex ? ' active' : '');
    item.innerHTML = `<span class="ts">${entry.ts}</span>${entry.query}`;
    item.onclick = () => {
      currentIndex = i;
      renderHistory();
      clearOutput();
      renderResult(entry.data);
    };
    historyList.appendChild(item);
  });
}

function openCorrectModal(chunk) {
  pendingCorrection = chunk;
  modalInfo.innerHTML =
    `File: <span>${chunk.source_file}</span><br>` +
    `Current section: <span>${chunk.section || 'UNKNOWN'}</span><br>` +
    `Page: <span>${chunk.page}</span> &nbsp; Chunk: <span>${chunk.chunk_index !== undefined ? chunk.chunk_index : '?'}</span>`;
  modalInput.value = chunk.section || '';
  modalOverlay.classList.add('visible');
  modalInput.focus();
  modalInput.select();
}

function closeModal() {
  modalOverlay.classList.remove('visible');
  pendingCorrection = null;
}

async function applyCorrection() {
  const c = pendingCorrection;
  const newSection = modalInput.value.trim();
  if (!newSection || !c) { closeModal(); return; }

  modalConfirm.disabled = true;
  modalConfirm.textContent = 'applying...';

  try {
    const r = await fetch(API + '/correct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source_file: c.source_file,
        page: c.page,
        chunk_index: c.chunk_index || 0,
        new_section: newSection,
      }),
    });
    if (!r.ok) throw new Error((await r.json()).detail);

    c.section = newSection;
    c.llm_corrected_section = true;
    if (currentIndex >= 0) renderResult(history[currentIndex].data);

  } catch(e) {
    alert('Correction failed: ' + e.message);
  } finally {
    modalConfirm.disabled = false;
    modalConfirm.textContent = 'Apply';
    closeModal();
  }
}

submitBtn.addEventListener('click', runQuery);

queryInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    runQuery();
  }
});

queryInput.addEventListener('input', () => {
  queryInput.style.height = 'auto';
  queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
});

modalCancel.addEventListener('click', closeModal);
modalConfirm.addEventListener('click', applyCorrection);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
modalInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyCorrection(); });

checkApi();
</script>
</body>
</html>
