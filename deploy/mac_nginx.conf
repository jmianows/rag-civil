# deploy/mac_nginx.conf — Civil RAG reverse proxy for Mac Mini
# No SSL block — Cloudflare Tunnel handles TLS termination externally.
# REPO_DIR is substituted by mac_start.sh via sed.
# Copy to: $(brew --prefix)/etc/nginx/servers/rag-civil.conf

server {
    listen 80;
    server_name _;

    root REPO_DIR/frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1024;

    # ── SSE endpoint — disable buffering so tokens stream immediately ──
    location = /query/stream {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Cache-Control     'no-cache';
        proxy_set_header   X-Accel-Buffering 'no';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── All other API endpoints ────────────────────────────────────────
    location ~ ^/(query|filters|correct|request|analytics|standards)(/.*)?$ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static frontend files ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
