# deploy/nginx.conf — Civil RAG reverse proxy + static file server
# Serves the frontend directly; proxies API calls to FastAPI on port 8000.
# Copy to: /etc/nginx/sites-available/rag-civil
# Enable:  ln -s /etc/nginx/sites-available/rag-civil /etc/nginx/sites-enabled/rag-civil

server {
    listen 80;
    server_name _;

    root /home/ubuntu/rag-civil/frontend;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json;
    gzip_min_length 1024;

    # ── SSE endpoint — disable buffering so tokens stream immediately ─
    # Must come before the general API location block.
    location = /query/stream {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # SSE requires these headers
        proxy_set_header   Connection        '';
        proxy_set_header   Cache-Control     'no-cache';
        proxy_set_header   X-Accel-Buffering 'no';

        # Disable all buffering — critical for streaming
        proxy_buffering    off;
        proxy_cache        off;

        # LLM generation can take a while
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── All other API endpoints — proxy to FastAPI ────────────────────
    location ~ ^/(query|filters|correct|request|analytics|standards)(/.*)?$ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # LLM calls can be slow — use generous timeouts
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_connect_timeout 10s;

        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static frontend files ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;

        # Cache static assets aggressively; HTML not cached (it changes)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
